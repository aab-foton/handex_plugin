<!-- VIEW: HOME -->
<main id="view-home" class="view active px-5 py-5 flex flex-col h-full overflow-y-auto">

  <div class="mb-4">
    <h2 class="text-[#1E293B] dark:text-white font-extrabold text-[15px] tracking-tight">O que vamos mapear hoje?</h2>
    <p class="text-slate-400 dark:text-dark-muted text-[11px] mt-0.5">Selecione uma ferramenta para começar.</p>
  </div>

  <!-- Cards 2×2 -->
  <div class="grid grid-cols-2 gap-2.5 w-full">

    <!-- Briefing -->
    <button onclick="navigate('view-briefing')" aria-label="Briefing do Projeto"
      class="flex flex-col items-start gap-2 p-3.5 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-emerald-300 hover:bg-emerald-50/40 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-emerald-300/30 outline-none text-left relative">
      <div class="w-8 h-8 flex items-center justify-center bg-emerald-50 dark:bg-emerald-900/20 rounded-xl shrink-0">
        <i data-lucide="clipboard-list" class="w-4 h-4 text-emerald-600 dark:text-emerald-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11.5px] tracking-tight text-slate-800 dark:text-white leading-tight">Briefing</p>
        <p class="text-[10px] text-slate-400 dark:text-dark-muted mt-0.5 leading-tight">Contexto e objetivos</p>
      </div>
      <span id="badge-briefing" class="hidden absolute top-2.5 right-2.5 w-2 h-2 rounded-full bg-emerald-500"></span>
    </button>

    <!-- Frameworks -->
    <button onclick="navigateToFrameworks()" aria-label="Frameworks de UX"
      class="flex flex-col items-start gap-2 p-3.5 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-violet-200 dark:hover:border-violet-800 hover:bg-violet-50/40 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-violet-300/30 outline-none text-left relative">
      <div class="w-8 h-8 flex items-center justify-center bg-violet-50 dark:bg-violet-900/20 rounded-xl shrink-0">
        <i data-lucide="layout-template" class="w-4 h-4 text-violet-500 dark:text-violet-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11.5px] tracking-tight text-slate-800 dark:text-white leading-tight">Frameworks</p>
        <p class="text-[10px] text-slate-400 dark:text-dark-muted mt-0.5 leading-tight">13 instrumentos de UX</p>
      </div>
      <span id="badge-frameworks" class="hidden absolute top-2 right-2 min-w-[16px] h-4 px-1 bg-violet-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center"></span>
    </button>

    <!-- Dados Coletados -->
    <button onclick="navigate('view-collected')" aria-label="Dados Coletados"
      class="flex flex-col items-start gap-2 p-3.5 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-sky-200 hover:bg-sky-50/40 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-sky-300/30 outline-none text-left">
      <div class="w-8 h-8 flex items-center justify-center bg-sky-50 dark:bg-sky-900/20 rounded-xl shrink-0">
        <i data-lucide="database" class="w-4 h-4 text-sky-500 dark:text-sky-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11.5px] tracking-tight text-slate-800 dark:text-white leading-tight">Dados Coletados</p>
        <p class="text-[10px] text-slate-400 dark:text-dark-muted mt-0.5 leading-tight">Resultados escaneados</p>
      </div>
    </button>

    <!-- Guia -->
    <button onclick="navigate('view-guide')" aria-label="Guia de uso"
      class="flex flex-col items-start gap-2 p-3.5 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-slate-300 hover:bg-slate-50/60 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-slate-300/30 outline-none text-left">
      <div class="w-8 h-8 flex items-center justify-center bg-gray-50 dark:bg-slate-700 rounded-xl shrink-0">
        <i data-lucide="book-open" class="w-4 h-4 text-slate-500 dark:text-slate-300" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11.5px] tracking-tight text-slate-800 dark:text-white leading-tight">Guia</p>
        <p class="text-[10px] text-slate-400 dark:text-dark-muted mt-0.5 leading-tight">Como usar o plugin</p>
      </div>
    </button>

  </div>

  <!-- CTA Exportar -->
  <div class="mt-auto pt-5">
    <button onclick="exportMaturaiData()"
      class="w-full py-3 bg-[#059669] hover:bg-[#047857] text-white text-[13px] font-extrabold rounded-2xl transition-colors flex items-center justify-center gap-2 shadow-sm">
      <i data-lucide="download" class="w-4 h-4" aria-hidden="true"></i>
      Exportar Dados do Projeto
    </button>
    <p class="text-[10px] text-slate-400 dark:text-dark-muted text-center mt-2 leading-tight">
      <i data-lucide="info" class="w-3 h-3 inline-block mr-1 opacity-70" aria-hidden="true"></i>
      Gera JSON para importação no HANDEX ou análise pela vertical.
    </p>
  </div>

</main>
