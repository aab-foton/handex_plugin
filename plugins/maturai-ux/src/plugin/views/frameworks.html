<!-- VIEW: FRAMEWORKS -->
<main id="view-frameworks" class="view px-5 py-5 flex flex-col h-full overflow-y-auto">

  <!-- Header da view -->
  <div class="flex items-center gap-3 mb-4">
    <button onclick="navigate('view-home')" class="p-1.5 hover:bg-gray-100 dark:hover:bg-dark-surface rounded-lg transition-colors text-slate-400" aria-label="Voltar">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
    </button>
    <div class="flex-1 min-w-0">
      <h2 class="text-[#1E293B] dark:text-white font-extrabold text-[14px] tracking-tight">Frameworks de UX</h2>
      <p class="text-slate-400 dark:text-dark-muted text-[10px]">Insira no canvas, preencha e escaneie os dados</p>
    </div>
    <button onclick="scanAll()"
      class="shrink-0 flex items-center gap-1.5 px-3 py-2 bg-[#059669] hover:bg-[#047857] text-white text-[11px] font-bold rounded-xl transition-colors">
      <i data-lucide="scan-line" class="w-3.5 h-3.5"></i>
      Escanear
    </button>
  </div>

  <!-- Filtros de categoria -->
  <div class="flex gap-1.5 flex-wrap mb-4">
    <button data-fw-filter="Todos" onclick="filterFrameworks('Todos')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Todos</button>
    <button data-fw-filter="Descoberta" onclick="filterFrameworks('Descoberta')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Descoberta</button>
    <button data-fw-filter="Alinhamento" onclick="filterFrameworks('Alinhamento')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Alinhamento</button>
    <button data-fw-filter="Diagnóstico" onclick="filterFrameworks('Diagnóstico')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Diagnóstico</button>
    <button data-fw-filter="Priorização" onclick="filterFrameworks('Priorização')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Priorização</button>
    <button data-fw-filter="Pesquisa" onclick="filterFrameworks('Pesquisa')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Pesquisa</button>
    <button data-fw-filter="Mapeamento" onclick="filterFrameworks('Mapeamento')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Mapeamento</button>
    <button data-fw-filter="Avaliação" onclick="filterFrameworks('Avaliação')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Avaliação</button>
    <button data-fw-filter="Ideação" onclick="filterFrameworks('Ideação')"
      class="px-2.5 py-1 text-[10px] font-bold rounded-full transition-all">Ideação</button>
  </div>

  <!-- Lista de frameworks -->
  <div id="framework-list" class="space-y-3 pb-4"></div>

</main>
