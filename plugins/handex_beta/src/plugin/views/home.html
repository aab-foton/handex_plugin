<!-- VIEW: HOME -->
<main id="view-home" class="view active px-4 py-3 flex flex-col h-full overflow-y-auto">

  <!-- Título -->
  <div class="mb-2.5">
    <h2 class="text-[#1E293B] dark:text-white font-extrabold text-[14px] tracking-tight">Do design à entrega, sem perder detalhes.</h2>
    <p class="text-slate-500 dark:text-dark-muted text-[11px] mt-0.5">Escaneie tokens, registre specs, mapeie fluxos e gere sua ficha técnica.</p>
  </div>

  <!-- Cards 2×3 -->
  <div class="grid grid-cols-2 gap-2 w-full">

    <!-- Guia -->
    <button onclick="navigate('view-guide')" aria-label="Guia de uso do plugin"
      class="flex flex-col items-start gap-1.5 p-3 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-slate-300 hover:bg-slate-50/60 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-slate-300/30 outline-none group text-left">
      <div class="w-7 h-7 flex items-center justify-center bg-gray-50 dark:bg-slate-700 rounded-xl shrink-0">
        <i data-lucide="book-open" class="w-3.5 h-3.5 text-slate-500 dark:text-slate-300" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11px] tracking-tight text-slate-800 dark:text-white leading-tight">Como usar o plugin</p>
        <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-0.5 leading-tight">Passo a passo de cada ferramenta</p>
      </div>
    </button>

    <!-- Dados do Projeto -->
    <button onclick="openDadosProjetoModal()" aria-label="Dados do Projeto"
      class="flex flex-col items-start gap-1.5 p-3 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-[#0070af]/40 hover:bg-[#0070af]/5 dark:hover:bg-blue-900/20 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-[#0070af]/30 outline-none group text-left">
      <div class="w-7 h-7 flex items-center justify-center bg-blue-50 dark:bg-blue-900/20 rounded-xl shrink-0">
        <i data-lucide="clipboard-list" class="w-3.5 h-3.5 text-[#0070af] dark:text-blue-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11px] tracking-tight text-slate-800 dark:text-white leading-tight">Informações do Projeto</p>
        <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-0.5 leading-tight">Título, versão, equipe e contexto</p>
      </div>
    </button>

    <!-- Design Tokens -->
    <button onclick="navigate('view-frames')" aria-label="Design Tokens"
      class="flex flex-col items-start gap-1.5 p-3 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-sky-300 hover:bg-sky-50/40 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-sky-300/30 outline-none group text-left">
      <div class="w-7 h-7 flex items-center justify-center bg-sky-50 dark:bg-sky-900/20 rounded-xl shrink-0">
        <i data-lucide="scan-line" class="w-3.5 h-3.5 text-sky-600 dark:text-sky-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11px] tracking-tight text-slate-800 dark:text-white leading-tight">Escanear Tokens</p>
        <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-0.5 leading-tight">Lê tokens e valida o Design System</p>
      </div>
    </button>

    <!-- Especificações -->
    <button onclick="navigate('view-specifications')" aria-label="Especificações"
      class="flex flex-col items-start gap-1.5 p-3 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-indigo-200 dark:hover:border-indigo-800 hover:bg-indigo-50/40 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-indigo-300/30 outline-none group text-left">
      <div class="w-7 h-7 flex items-center justify-center bg-indigo-50 dark:bg-indigo-900/20 rounded-xl shrink-0">
        <i data-lucide="tag" class="w-3.5 h-3.5 text-indigo-600 dark:text-indigo-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11px] tracking-tight text-slate-800 dark:text-white leading-tight">Anotar Specs</p>
        <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-0.5 leading-tight">Notas técnicas e referências de componente</p>
      </div>
    </button>

    <!-- Medidas -->
    <button onclick="navigate('view-measurement')" aria-label="Medidas"
      class="flex flex-col items-start gap-1.5 p-3 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-cyan-300 hover:bg-cyan-50/40 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-cyan-300/30 outline-none group text-left">
      <div class="w-7 h-7 flex items-center justify-center bg-cyan-50 dark:bg-cyan-900/20 rounded-xl shrink-0">
        <i data-lucide="ruler" class="w-3.5 h-3.5 text-cyan-600 dark:text-cyan-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11px] tracking-tight text-slate-800 dark:text-white leading-tight">Anotar Medidas</p>
        <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-0.5 leading-tight">Insere dimensões e espaçamentos no canvas</p>
      </div>
    </button>

    <!-- Fluxos -->
    <button onclick="navigate('view-flows')" aria-label="Fluxos"
      class="flex flex-col items-start gap-1.5 p-3 bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line hover:border-purple-200 dark:hover:border-purple-800 hover:bg-purple-50/40 dark:hover:bg-slate-800 rounded-2xl shadow-sm transition-all focus:ring-2 focus:ring-purple-300/30 outline-none group text-left">
      <div class="w-7 h-7 flex items-center justify-center bg-purple-50 dark:bg-purple-900/20 rounded-xl shrink-0">
        <i data-lucide="git-branch" class="w-3.5 h-3.5 text-purple-600 dark:text-purple-400" aria-hidden="true"></i>
      </div>
      <div class="min-w-0">
        <p class="font-extrabold text-[11px] tracking-tight text-slate-800 dark:text-white leading-tight">Fluxos de Tela</p>
        <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-0.5 leading-tight">Mapeia conexões entre telas e estados</p>
      </div>
    </button>

  </div>

  <!-- CTA Handoff -->
  <div class="mt-auto pt-3 w-full space-y-2">
    <button onclick="navigate('view-handoff-summary')" aria-label="Ir para Handoff"
      class="w-full py-2.5 bg-[#005ca9] hover:bg-[#004d8f] text-white text-[12px] font-extrabold rounded-2xl transition-colors flex items-center justify-center gap-2 shadow-sm">
      <i data-lucide="send" class="w-4 h-4" aria-hidden="true"></i>
      Gerar Ficha de Handoff
    </button>

    <button onclick="importHandoffData()" aria-label="Importar dados de um arquivo JSON"
      class="w-full flex items-center justify-center gap-1.5 px-3 py-2 bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-line rounded-xl text-[11px] font-bold text-slate-500 dark:text-dark-muted hover:bg-gray-50 dark:hover:bg-slate-800 outline-none transition-all shadow-sm">
      <i data-lucide="upload" class="w-3.5 h-3.5" aria-hidden="true"></i> Importar JSON
    </button>
  </div>

</main>
