<!-- VIEW: HANDOFF SUMMARY -->
<main id="view-handoff-summary" class="view flex p-0 flex-col h-full overflow-hidden">

  <!-- Header -->
  <div class="px-4 pt-3 pb-3 border-b border-gray-100 dark:border-dark-line flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2">
      <button onclick="navigate('view-home')" aria-label="Voltar"
        class="p-2 bg-gray-100 dark:bg-slate-800 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors shrink-0">
        <i data-lucide="arrow-left" class="w-4 h-4 text-gray-600 dark:text-gray-300" aria-hidden="true"></i>
      </button>
      <div>
        <h2 class="text-[#1E293B] dark:text-white font-bold text-[16px] leading-tight">Handoff</h2>
        <p class="text-[10px] text-slate-500 dark:text-dark-muted leading-none mt-0.5">Resumo e exportação da entrega</p>
      </div>
    </div>
    <button onclick="createHandoffOnCanvas()" class="fab-inline" title="Gerar Ficha no Canvas" aria-label="Gerar Ficha no Canvas">
      <i data-lucide="layout-dashboard" class="w-4 h-4 shrink-0"></i>
    </button>
  </div>

  <!-- Scrollable content -->
  <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-6" onscroll="handleScroll(this)">

    <!-- Resumo do Projeto -->
    <div class="bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line rounded-2xl shadow-sm p-4">
      <h4 class="text-[11px] font-bold text-slate-500 dark:text-dark-muted uppercase tracking-wider mb-3">Resumo do Projeto</h4>
      <div id="handoff-summary-project" class="space-y-2">
        <div class="flex items-center justify-between">
          <span class="text-[12px] text-slate-500 dark:text-dark-muted">Projeto</span>
          <span id="hs-titulo" class="text-[12px] font-bold text-slate-800 dark:text-white text-right max-w-[200px] truncate">—</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-[12px] text-slate-500 dark:text-dark-muted">Versão</span>
          <span id="hs-versao" class="text-[12px] font-bold text-slate-800 dark:text-white">—</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-[12px] text-slate-500 dark:text-dark-muted">Status</span>
          <span id="hs-status" class="text-[12px] font-bold text-slate-800 dark:text-white">—</span>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-[12px] text-slate-500 dark:text-dark-muted">Designer</span>
          <span id="hs-designer" class="text-[12px] font-bold text-slate-800 dark:text-white text-right max-w-[200px] truncate">—</span>
        </div>
        <div id="hs-jornada-row" class="hidden flex items-center justify-between">
          <span class="text-[12px] text-slate-500 dark:text-dark-muted">Jornada</span>
          <span id="hs-jornada" class="text-[12px] font-bold text-slate-800 dark:text-white text-right max-w-[200px] truncate">—</span>
        </div>
        <div id="hs-feature-row" class="hidden flex items-center justify-between">
          <span class="text-[12px] text-slate-500 dark:text-dark-muted">Feature</span>
          <span id="hs-feature" class="text-[12px] font-bold text-slate-800 dark:text-white text-right max-w-[200px] truncate">—</span>
        </div>
      </div>
    </div>

    <!-- Estatísticas -->
    <div class="bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line rounded-2xl shadow-sm p-4">
      <h4 class="text-[11px] font-bold text-slate-500 dark:text-dark-muted uppercase tracking-wider mb-3">Documentação</h4>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-sky-50 dark:bg-sky-900/20 rounded-xl p-3 text-center">
          <p id="hs-count-frames" class="text-[22px] font-extrabold text-sky-600 dark:text-sky-400 leading-none">0</p>
          <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-1">Frames</p>
        </div>
        <div class="bg-indigo-50 dark:bg-indigo-900/20 rounded-xl p-3 text-center">
          <p id="hs-count-specs" class="text-[22px] font-extrabold text-indigo-600 dark:text-indigo-400 leading-none">0</p>
          <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-1">Specs</p>
        </div>
        <div class="bg-cyan-50 dark:bg-cyan-900/20 rounded-xl p-3 text-center">
          <p id="hs-count-measures" class="text-[22px] font-extrabold text-cyan-600 dark:text-cyan-400 leading-none">0</p>
          <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-1">Medidas</p>
        </div>
        <div class="bg-purple-50 dark:bg-purple-900/20 rounded-xl p-3 text-center">
          <p id="hs-count-flows" class="text-[22px] font-extrabold text-purple-600 dark:text-purple-400 leading-none">0</p>
          <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-1">Fluxos</p>
        </div>
      </div>
    </div>

    <!-- Ações de Exportação -->
    <div class="bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-line rounded-2xl shadow-sm p-4">
      <h4 class="text-[11px] font-bold text-slate-500 dark:text-dark-muted uppercase tracking-wider mb-3">Exportar</h4>
      <div class="space-y-2.5">

        <!-- Exportar .MD -->
        <button onclick="exportHandoffMD()"
          class="w-full flex items-center gap-3 px-4 py-3 bg-gray-50 dark:bg-dark-bg hover:bg-gray-100 dark:hover:bg-slate-800 border border-gray-200 dark:border-dark-line rounded-xl transition-colors text-left">
          <div class="w-8 h-8 flex items-center justify-center bg-slate-100 dark:bg-slate-700 rounded-lg shrink-0">
            <i data-lucide="file-text" class="w-4 h-4 text-slate-600 dark:text-slate-300"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[12px] font-bold text-slate-800 dark:text-white">Exportar como Markdown</p>
            <p class="text-[10px] text-slate-500 mt-0.5">Documentação técnica em formato .MD</p>
          </div>
          <i data-lucide="download" class="w-4 h-4 text-slate-500 shrink-0"></i>
        </button>

        <!-- Exportar .JSON -->
        <button onclick="exportHandoffData()"
          class="w-full flex items-center gap-3 px-4 py-3 bg-gray-50 dark:bg-dark-bg hover:bg-gray-100 dark:hover:bg-slate-800 border border-gray-200 dark:border-dark-line rounded-xl transition-colors text-left">
          <div class="w-8 h-8 flex items-center justify-center bg-slate-100 dark:bg-slate-700 rounded-lg shrink-0">
            <i data-lucide="braces" class="w-4 h-4 text-slate-600 dark:text-slate-300"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[12px] font-bold text-slate-800 dark:text-white">Exportar como JSON</p>
            <p class="text-[10px] text-slate-500 mt-0.5">Backup completo dos dados do projeto</p>
          </div>
          <i data-lucide="download" class="w-4 h-4 text-slate-500 shrink-0"></i>
        </button>

        <!-- Gerar Ficha no Canvas -->
        <button onclick="createHandoffOnCanvas()"
          class="w-full flex items-center gap-3 px-4 py-3 bg-[#0070af]/8 hover:bg-[#0070af]/15 border border-[#0070af]/25 rounded-xl transition-colors text-left">
          <div class="w-8 h-8 flex items-center justify-center bg-[#0070af]/15 rounded-lg shrink-0">
            <i data-lucide="layout-dashboard" class="w-4 h-4 text-[#0070af] dark:text-blue-400"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[12px] font-bold text-[#0070af] dark:text-blue-400">Gerar Ficha no Canvas</p>
            <p class="text-[10px] text-[#0070af]/60 dark:text-blue-400/60 mt-0.5">Cria o documento visual no Figma</p>
          </div>
          <i data-lucide="external-link" class="w-4 h-4 text-[#0070af]/60 dark:text-blue-400/60 shrink-0"></i>
        </button>

        <!-- Publicar no Sharepoint (placeholder) -->
        <button disabled
          class="w-full flex items-center gap-3 px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-dashed border-gray-200 dark:border-dark-line rounded-xl text-left opacity-50 cursor-not-allowed">
          <div class="w-8 h-8 flex items-center justify-center bg-slate-100 dark:bg-slate-700 rounded-lg shrink-0">
            <i data-lucide="cloud-upload" class="w-4 h-4 text-slate-500 dark:text-slate-500"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[12px] font-bold text-slate-600 dark:text-slate-300">Publicar no Sharepoint</p>
            <p class="text-[10px] text-slate-500 mt-0.5">Em breve — integração com plataforma</p>
          </div>
          <span class="text-[10px] font-bold text-slate-500 bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded-full shrink-0">Em breve</span>
        </button>

      </div>
    </div>

  </div>
</main>
