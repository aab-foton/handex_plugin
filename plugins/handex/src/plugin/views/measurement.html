<!-- VIEW: MEASUREMENT -->
    <main id="view-measurement" class="view p-0 flex flex-col h-full overflow-hidden">
      <!-- Header -->
      <div class="px-4 pt-0 pb-3 border-b border-gray-100 dark:border-dark-line flex flex-col shrink-0">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3">
            <button onclick="navigate('view-home')" aria-label="Voltar para a página inicial"
              class="p-2 bg-gray-100 dark:bg-slate-800 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">
              <i data-lucide="arrow-left" class="w-4 h-4 text-gray-600 dark:text-gray-300" aria-hidden="true"></i>
            </button>
            <h2 class="text-[#1E293B] dark:text-white font-bold text-[18px]">Anotar Medidas</h2>
          </div>
          <div class="flex items-center gap-1.5">
            <button data-collapse-toggle onclick="collapseAllAccordions(document.getElementById('measures-scroll-container'))" title="Recolher/expandir todos" aria-label="Recolher ou expandir todos os accordions"
              class="p-1.5 hover:bg-light-line dark:hover:bg-dark-surface rounded-md transition-colors text-slate-500 dark:text-dark-muted">
              <i data-lucide="chevrons-up-down" class="w-4 h-4" aria-hidden="true"></i>
            </button>
            <button onclick="openMeasureModal()" class="fab-inline" title="Inserir medida" aria-label="Inserir medida">
              <i data-lucide="plus" class="w-4 h-4 shrink-0"></i>
              <span>Inserir medida</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Scrollable content -->
      <div id="measures-scroll-container" class="flex-1 overflow-y-auto pt-1 px-4 pb-4" onscroll="handleScroll(this)">
        <div class="space-y-4 max-w-[440px] mx-auto">

          <!-- Frame Selector -->
          <div data-frame-selector-card>
            <div class="flex items-center gap-2 mb-2.5">
              <i data-lucide="scan-line" class="w-3.5 h-3.5 text-slate-500 shrink-0"></i>
              <h4 class="text-[11px] font-bold text-slate-500 dark:text-slate-500 uppercase tracking-wider">Frames Mapeados</h4>
            </div>
            <select id="measure-frame-selector" onchange="setMeasureActiveFrame(this.value)"
              class="w-full text-[12px] bg-gray-50 dark:bg-slate-800 border border-gray-200 dark:border-dark-line rounded-xl px-3 py-2.5 text-slate-700 dark:text-white outline-none focus:border-[#0070af]/50 transition-colors">
              <option value="">Sem vínculo (medida avulsa)</option>
            </select>
            <p class="text-[10px] text-slate-500 dark:text-dark-muted mt-2 leading-tight">
              Selecione um frame para focá-lo no canvas e associar esta medida a ele.
            </p>
          </div>

          <!-- Results -->
          <div>
            <div class="flex items-center justify-between mb-3">
              <h4 class="text-[11px] font-bold text-slate-500 dark:text-dark-muted uppercase tracking-wider">Medidas Criadas</h4>
              <div class="flex items-center gap-3">
                <button id="btn-hide-all-measures" onclick="toggleAllMeasuresVisibility()"
                  class="hidden text-[11px] font-bold text-slate-500 hover:text-slate-700 dark:text-slate-500 dark:hover:text-slate-200 transition-colors flex items-center gap-1">
                  <i data-lucide="eye-off" class="w-3.5 h-3.5"></i> Ocultar tudo
                </button>
                <button id="btn-export-measures" onclick="exportMeasurements()"
                  class="hidden text-[11px] font-bold text-[#0070af] dark:text-blue-400 hover:underline flex items-center gap-1">
                  <i data-lucide="download" class="w-3.5 h-3.5"></i> Exportar (.md)
                </button>
              </div>
            </div>
            <!-- Instrução discreta -->
            <div id="hint-measures" class="mb-5 p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800/30 flex gap-2">
              <i data-lucide="info" class="w-4 h-4 text-blue-600 dark:text-blue-400 shrink-0 mt-0.5"></i>
              <p class="text-[11px] text-blue-800 dark:text-blue-300 leading-tight">
                Selecione os elementos no canvas e toque no botão <strong>+</strong> abaixo.
              </p>
            </div>
            <div class="mb-5 p-3 bg-blue-50 dark:bg-blue-900/40 rounded-xl border border-blue-200 dark:border-dark-line flex gap-2">
              <i data-lucide="info" class="w-4 h-4 text-blue-500 shrink-0 mt-0.5"></i>
              <p class="text-[10px] text-blue-500 dark:text-blue-300 leading-tight italic">
                <strong>Dica de Uso:</strong> O destaque e o scroll automático no Figma ocorrem apenas ao clicar para expandir um item da lista.
              </p>
            </div>

            <div id="measurements-results" class="flex flex-col gap-2 min-h-[50px]">
               <!-- List of created items will appear here -->
            </div>

          </div>


        </div>
      </div>

    </main>
