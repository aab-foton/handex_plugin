<!-- VIEW: FLOWS (Diagramas de Fluxo) -->
<main id="view-flows" class="view flex p-0 flex-col h-full overflow-hidden">
  <!-- Sub-Header -->
  <div class="px-4 pt-3 pb-3 border-b border-gray-100 dark:border-dark-line flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2">
      <button onclick="navigate('view-home')" aria-label="Voltar para a página inicial"
        class="p-2 bg-gray-100 dark:bg-slate-800 rounded-lg hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors shrink-0">
        <i data-lucide="arrow-left" class="w-4 h-4 text-gray-600 dark:text-gray-300" aria-hidden="true"></i>
      </button>
      <h2 class="text-[#1E293B] dark:text-white font-bold text-[16px] leading-tight">Fluxos</h2>
    </div>
    <button onclick="openFlowFormModal()" class="fab-inline" title="Conectar Frames" aria-label="Conectar Frames">
      <i data-lucide="git-branch" class="w-4 h-4 shrink-0"></i>
      <span>Conectar Frames</span>
    </button>
  </div>

  <!-- Scrollable Content -->
  <div class="flex-1 overflow-y-auto p-4 pb-24 space-y-4" onscroll="handleScroll(this)">

    <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-xl border border-blue-100 dark:border-blue-800/30 flex gap-2.5">
      <i data-lucide="info" class="w-4 h-4 text-blue-600 dark:text-blue-400 shrink-0 mt-0.5"></i>
      <p class="text-[11px] text-blue-800 dark:text-blue-300 leading-tight">
        Selecione dois elementos no Figma e use o botão <strong>+ Conectar Frames</strong> para mapear fluxos de navegação.
      </p>
    </div>

    <div id="flows-results" class="flex flex-col gap-2 min-h-[50px]">
      <!-- renderFlowsList() insere aqui -->
    </div>

  </div>

</main>
