<!DOCTYPE html>
<html lang="pt-BR" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResponsivUX – CAIXA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

    :root {
      /* Cores Fixas CAIXA */
      --caixa-blue:    #0070B8;
      --caixa-orange:  #F47920;
      --caixa-blue-dk: #00538a;
      
      /* Cores do Tema (Light por padrão) */
      --bg:        #ffffff;
      --surface:   #f5f5f5;
      --border:    #e5e5e5;
      --text:      #111111;
      --muted:     #666666;
      --accent-lo: rgba(0, 112, 184, 0.1);
      --success:   #27ae60;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
      
      --header-bg: var(--caixa-blue);
      --sub-bg:    var(--caixa-blue-dk);
    }
    
    /* Dark Mode Manual */
    html.dark-mode {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #f8fafc;
      --muted:     #94a3b8;
      --accent-lo: rgba(0, 112, 184, 0.25);
      --header-bg: #004a7a;
      --sub-bg:    #0f172a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 13px;
      transition: font-size 0.2s ease;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      width: 100%;
      height: 100vh; /* Ocupa toda a altura da janela do Figma */
      margin: 0;
      padding: 0;
      overflow: hidden;
      user-select: none;
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    /* Foco acessível */
    *:focus-visible {
      outline: 2px solid var(--caixa-orange);
      outline-offset: 2px;
    }

    .scalable-content {
      width: 100%;
    }
    
    body::-webkit-scrollbar {
      width: 5px;
    }
    body::-webkit-scrollbar-track {
      background: transparent;
    }
    body::-webkit-scrollbar-thumb {
      background: rgba(125, 133, 144, 0.3);
      border-radius: 3px;
    }
    body::-webkit-scrollbar-thumb:hover {
      background: rgba(125, 133, 144, 0.5);
    }

    /* ══ HEADER ══ */
    .header {
      background: var(--caixa-blue);
      position: relative;
      overflow: hidden;
    }

    /* Triângulo laranja — referência ao X do logo CAIXA */
    .header::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 4rem;
      background: var(--caixa-orange);
      clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%);
    }

    .header-inner {
      position: relative;
      z-index: 1;
      padding: 0.62rem 1.23rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Logo SVG CAIXA */
    .caixa-logo {
      height: 1.54rem;
      width: auto;
      flex-shrink: 0;
    }

    /* Badge e Ícones */
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-right: 3.69rem;
    }

    .icon-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    .icon-btn:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn svg { 
      width: 1.15rem; 
      height: 1.15rem; 
      pointer-events: none; 
      transition: transform 0.2s ease;
    }
    .icon-btn:hover svg { transform: scale(1.1); }

    .plugin-badge {
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 4px;
      padding: 0.23rem 0.62rem;
      font-family: var(--mono);
      font-size: 0.69rem;
      font-weight: 600;
      letter-spacing: .10em;
      text-transform: uppercase;
      color: #fff;
      white-space: nowrap;
    }

    .header {
      background: var(--header-bg);
      position: relative;
      overflow: hidden;
      transition: background 0.3s ease;
    }
    
    .subheader {
      background: var(--sub-bg);
      padding: 0.38rem 1.23rem;
      font-size: 0.69rem;
      color: rgba(255,255,255,0.70);
      letter-spacing: .04em;
      transition: background 0.3s ease;
    }

    /* ══ CONTENT ══ */
    .content { 
      flex: 1 1 auto; 
      padding: 0.46rem 1.23rem 0.15rem; 
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .label {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.92rem 1.23rem 0.46rem;
    }

    .bp-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.62rem;
      margin-bottom: 1rem;
    }

    .bp-btn {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.54rem;
      padding: 0.6rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      overflow: hidden;
    }
    .bp-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent-lo);
      opacity: 0;
      transition: opacity .15s;
    }
    /* barra laranja lateral */
    .bp-btn::after {
      content: '';
      position: absolute;
      left: 0; top: 18%; bottom: 18%;
      width: 3px;
      background: var(--caixa-orange);
      border-radius: 0 2px 2px 0;
      opacity: 0;
      transition: opacity .15s;
    }
    .bp-btn:hover { 
      border-color: var(--caixa-blue); 
      background: rgba(0, 112, 184, 0.05);
      transform: translateY(-2px);
    }
    .bp-btn:hover::before { opacity: 1; }
    .bp-btn:hover::after  { opacity: 1; }
    .bp-btn:active { transform: scale(.97) translateY(0); }

    .bp-btn .bp-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      display: block;
      position: relative;
    }
    .bp-btn .bp-px {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--caixa-orange);
      display: block;
      margin-top: 0.31rem;
      font-weight: 500;
      position: relative;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0.46rem 0 1rem;
    }

    .spacing-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 0.77rem;
    }
    .spacing-row span { font-size: 0.77rem; color: var(--muted); }
    .spacing-input {
      width: 4.92rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.38rem;
      padding: 0.38rem 0.62rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      text-align: right;
      outline: none;
      transition: border-color .15s;
    }
    .spacing-input:focus { border-color: var(--caixa-blue); }

    .zoom-controls {
      display: flex;
      gap: 0.62rem;
      align-items: center;
      padding: 0 1.23rem 1.08rem;
    }
    .zoom-btn {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.62rem;
      padding: 0.77rem 0;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, background .15s, color .15s;
    }
    .zoom-btn:hover { border-color: var(--caixa-blue); }
    .zoom-btn.active {
      background: var(--caixa-blue);
      border-color: var(--caixa-blue);
      color: #fff;
    }

    .btn-all {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.62rem;
      width: calc(100% - 2.46rem);
      margin: 0.62rem 1.23rem 0.77rem;
      padding: 0.77rem;
      background: var(--caixa-blue);
      border: none;
      border-radius: 0.54rem;
      color: #fff;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .15s, transform .1s;
      position: relative;
      overflow: hidden;
    }
    .btn-all::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 0.38rem;
      background: var(--caixa-orange);
    }
    .btn-all:hover { background: var(--caixa-blue-dk); }
    .btn-all:active { transform: scale(.97); }
    .btn-all svg { width: 1.08rem; height: 1.08rem; flex-shrink: 0; }
    
    /* ══ INSTRUCTIONS ══ */
    .hint-box {
      background: var(--accent-lo);
      border-left: 3px solid var(--caixa-blue);
      padding: 0.62rem 0.85rem;
      margin-bottom: 1rem;
      border-radius: 0 0.46rem 0.46rem 0;
      font-size: 0.82rem;
      line-height: 1.35;
      color: var(--text);
    }
    .hint-box b { color: var(--caixa-blue); }

    /* ══ STATUS ══ */
    .status-container { margin-bottom: 1rem; }
    
    #status {
      font-family: var(--mono);
      font-size: 0.77rem;
      padding: 0.77rem 0.92rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.46rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.62rem;
      transition: all 0.3s ease;
      min-height: 2.5rem;
    }

    #status.ok { 
      background: rgba(39, 174, 96, 0.1); 
      border-color: var(--success); 
      color: var(--success); 
    }
    
    #status.error { 
      background: rgba(231, 76, 60, 0.1); 
      border-color: #e74c3c; 
      color: #e74c3c;
      animation: shake 0.4s ease-in-out;
    }

    #status.warn {
      background: rgba(243, 156, 18, 0.1);
      border-color: #f39c12;
      color: #f39c12;
    }

    #status.loading {
      color: var(--caixa-blue);
      border-color: var(--caixa-blue);
    }
    #status.loading span::before {
      content: '';
      display: inline-block;
      width: 0.5rem;
      height: 0.5rem;
      background: currentColor;
      border-radius: 50%;
      margin-right: 0.5rem;
      animation: pulse 1s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    /* ══ FOOTER FÓTON ══ */
    .footer {
      border-top: 1px solid var(--border);
      padding: 0.54rem 1.23rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.38rem;
      background: var(--surface);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .footer-icon { width: 0.77rem; height: 1rem; }
    .footer-text  { font-size: 0.69rem; color: var(--muted); }
    .footer-brand {
      font-size: 0.69rem;
      font-weight: 700;
      color: var(--caixa-orange);
      letter-spacing: .05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ══ HEADER CAIXA ════════════════════════════════════════ -->
  <header class="header">
    <div class="header-inner">

      <svg class="caixa-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 205.51265 46.553631">
        <g transform="translate(-284.78446,-475.51214)">
          <g transform="matrix(1.25,0,0,-1.25,15.493106,1024.9702)">
            <g transform="scale(0.24,0.24)">
              <path d="m 1107.19,1780.04 -17.74,-44.21 24.55,0 -6.73,44.39 -0.08,-0.18 z m -93.98,-101.49 72.77,149.83 55.02,0 30.68,-149.83 -48.3,0 -3.56,19.97 -46.86,0 -10.78,-19.97 -48.97,0 z m 181.34,0 21.08,149.83 48.67,0 -21.07,-149.83 -48.68,0 z m 323.71,101.67 -17.81,-44.39 24.54,0 -6.73,44.39 z m -94.06,-101.67 72.78,149.83 55.01,0 30.69,-149.83 -48.31,0 -3.55,19.97 -46.87,0 -10.78,-19.97 -48.97,0" class="fill-[#0070af] dark:fill-white" style="fill-opacity:1;fill-rule:evenodd;stroke:none;fill:white"/>
              <path d="m 1316.6,1748.61 60.99,0 41.79,-69.21 -61,0 -41.78,69.21" class="fill-[#0070af] dark:fill-white" style="fill-opacity:1;fill-rule:evenodd;stroke:none;fill:white"/>
              <path d="m 1322.94,1759.24 63.04,0 54.75,68.92 -63.04,0 -54.75,-68.92" style="fill:#f6822a;fill-opacity:1;fill-rule:evenodd;stroke:none"/>
              <path d="m 1259.91,1678.98 63.03,0 54.75,69.76 -63.04,0 -54.74,-69.76" style="fill:#f6822a;fill-opacity:1;fill-rule:evenodd;stroke:none"/>
              <path d="m 1282.64,1829 58.83,0 40.31,-69.76 -58.84,0 -40.3,69.76" class="fill-[#0070af] dark:fill-white" style="fill-opacity:1;fill-rule:evenodd;stroke:none;fill:white"/>
              <path d="m 1014.65,1823.02 -4.68,-44.07 c -17.939,24.75 -59.517,7.67 -62.782,-23.16 -4.149,-39.13 35.867,-48.25 57.642,-25.21 l -4.69,-44.17 c -6.499,-3.19 -12.855,-5.67 -19.128,-7.34 -6.239,-1.68 -12.492,-2.57 -18.696,-2.7 -7.8,-0.17 -14.867,0.65 -21.234,2.44 -6.367,1.76 -12.129,4.56 -17.227,8.34 -9.832,7.19 -16.941,16.33 -21.32,27.45 -4.379,11.16 -5.82,23.75 -4.328,37.82 1.203,11.31 4.051,21.62 8.59,30.97 4.5,9.34 10.734,17.84 18.672,25.54 7.504,7.34 15.676,12.88 24.519,16.64 8.809,3.73 18.422,5.72 28.813,5.94 6.207,0.13 12.297,-0.49 18.207,-1.92 5.942,-1.42 11.802,-3.64 17.642,-6.57" class="fill-[#0070af] dark:fill-white" style="fill-opacity:1;fill-rule:evenodd;stroke:none;fill:white"/>

          </g>
        </g>
      </svg>

      <div class="header-right">
        <span class="plugin-badge">ResponsivUX</span>
        <button id="themeToggle" class="icon-btn" onclick="toggleTheme()" title="Alternar Tema (Claro/Escuro)" aria-label="Trocar Tema">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button id="zoomLupa" class="icon-btn" onclick="toggleZoom()" title="Alternar Zoom da Interface" aria-label="Aumentar/Diminuir Zoom">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="11" y1="8" x2="11" y2="14"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>
  <div class="subheader">Gerador de Breakpoints Responsivos</div>

  <!-- ══ CONTEÚDO ══════════════════════════════════════════ -->
  <main class="content">

    <div class="hint-box">
      <b>Como usar:</b> Selecione um Frame no Figma e clique em um breakpoint ou em "Gerar Todos" para criar a versão responsiva.
    </div>

    <div class="label" id="label-spacing">Espaçamento entre frames</div>
    <div class="spacing-row">
      <label for="gapInput">Gap horizontal (px)</label>
      <input class="spacing-input" type="number" id="gapInput" value="80" min="0" max="400" aria-labelledby="label-spacing" />
    </div>

    <div class="label" id="label-breakpoints">Breakpoints Disponíveis</div>
    <div class="bp-grid" role="list">
      <button class="bp-btn" data-width="768" role="listitem">
        <span class="bp-name">Tablet Port.</span>
        <span class="bp-px">768 px</span>
      </button>
      <button class="bp-btn" data-width="1024" role="listitem">
        <span class="bp-name">Tablet Land.</span>
        <span class="bp-px">1024 px</span>
      </button>
      <button class="bp-btn" data-width="1280" role="listitem">
        <span class="bp-name">Web Std</span>
        <span class="bp-px">1280 px</span>
      </button>
      <button class="bp-btn" data-width="1440" role="listitem">
        <span class="bp-name">Web Large</span>
        <span class="bp-px">1440 px</span>
      </button>
      <button class="bp-btn" data-width="1536" role="listitem">
        <span class="bp-name">Desk Large</span>
        <span class="bp-px">1536 px</span>
      </button>
      <button class="bp-btn" data-width="1920" role="listitem">
        <span class="bp-name">Desk FHD</span>
        <span class="bp-px">1920 px</span>
      </button>
      <button class="bp-btn" data-width="2560" role="listitem">
        <span class="bp-name">Desk 2K</span>
        <span class="bp-px">2560 px</span>
      </button>
      <button class="bp-btn" data-width="3840" role="listitem">
        <span class="bp-name">Desk 4K</span>
        <span class="bp-px">3840 px</span>
      </button>
    </div>

    <div class="divider" role="presentation"></div>

    <button class="btn-all" id="generateAll">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="9" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>
      </svg>
      Gerar Todos
    </button>

    <div class="status-container">
      <div class="status" id="status" role="status" aria-live="polite">
        <span id="statusText">● Aguardando seleção...</span>
      </div>
    </div>

  </main>

  <!-- ══ FOOTER FÓTON ══════════════════════════════════════ -->
  <div class="footer">
    <svg class="footer-icon" viewBox="0 0 10 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M6 0L0 8H4.5L3.5 14L10 5.5H5.5L6 0Z" fill="#F47920"/>
    </svg>
    <span class="footer-text">Desenvolvido por</span>
    <a href="https://www.foton.la/" target="_blank" rel="noopener noreferrer" class="footer-brand" style="text-decoration: none; cursor: pointer;">Fóton</a>
  </div>

<script>
  function setStatus(text, type = '') {
    const el = document.getElementById('status');
    document.getElementById('statusText').textContent = text;
    el.className = 'status ' + type;
    
    // Auto-reset se for sucesso após 5 segundos
    if (type === 'ok') {
      setTimeout(() => {
        if (document.getElementById('statusText').textContent === text) {
          document.getElementById('statusText').textContent = '● Aguardando seleção...';
          el.className = 'status';
        }
      }, 5000);
    }
  }

  function getGap() {
    return parseInt(document.getElementById('gapInput').value, 10) || 80;
  }

  document.querySelectorAll('.bp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const width = parseInt(btn.dataset.width, 10);
      const label = btn.querySelector('.bp-name').textContent;
      setStatus(`Gerando ${label}…`, 'loading');
      document.getElementById('status').scrollIntoView({ behavior: 'smooth', block: 'end' });
      parent.postMessage({ pluginMessage: { type: 'generate-single', width, gap: getGap() } }, '*');
    });
  });

  document.getElementById('generateAll').addEventListener('click', () => {
    const widths = Array.from(document.querySelectorAll('.bp-btn')).map(b => parseInt(b.dataset.width, 10));
    setStatus('Gerando todos os breakpoints…', 'loading');
    document.getElementById('status').scrollIntoView({ behavior: 'smooth', block: 'end' });
    parent.postMessage({ pluginMessage: { type: 'generate-all', widths, gap: getGap() } }, '*');
  });

  const UI_ZOOM_KEY = 'responsivux-ui-zoom';
  const UI_THEME_KEY = 'responsivux-ui-theme';
  const SCALES = [0.8, 1, 1.25];
  let currentScaleIndex = 1;

  function applyZoom(scale) {
    const scaleNum = parseFloat(scale);
    const baseFontSize = 14;
    const newFontSize = baseFontSize * scaleNum;
    document.documentElement.style.fontSize = newFontSize + 'px';
    localStorage.setItem(UI_ZOOM_KEY, scaleNum);
    currentScaleIndex = SCALES.findIndex(s => Math.abs(s - scaleNum) < 0.01);
    if (currentScaleIndex === -1) currentScaleIndex = 1;
  }

  function toggleZoom() {
    currentScaleIndex = (currentScaleIndex + 1) % SCALES.length;
    applyZoom(SCALES[currentScaleIndex]);
  }

  function applyTheme(theme) {
    const isDark = theme === 'dark';
    if (isDark) {
      document.documentElement.classList.add('dark-mode');
    } else {
      document.documentElement.classList.remove('dark-mode');
    }
    localStorage.setItem(UI_THEME_KEY, theme);
    
    // Atualiza o ícone (Sol para Dark Mode ativado, Lua para Light)
    const themeIcon = document.getElementById('themeIcon');
    if (isDark) {
      themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
    } else {
      themeIcon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
    }
  }

  function toggleTheme() {
    const isCurrentlyDark = document.documentElement.classList.contains('dark-mode');
    const newTheme = isCurrentlyDark ? 'light' : 'dark';
    applyTheme(newTheme);
  }

  function toggleZoom() {
    currentScaleIndex = (currentScaleIndex + 1) % SCALES.length;
    applyZoom(SCALES[currentScaleIndex]);
  }

  // O redimensionamento agora é fixo para permitir a rolagem interna com footer fixo
  function syncWindowSize() {
    // Mantemos uma largura fixa e uma altura confortável para o conteúdo rolável
    const width = 400;
    const height = 700; 
    
    parent.postMessage({ 
      pluginMessage: { 
        type: 'resize', 
        width, 
        height 
      } 
    }, '*');
  }

  // Sincroniza uma vez na inicialização
  function initControls() {
    let savedZoom = 1;
    try { savedZoom = localStorage.getItem(UI_ZOOM_KEY) || 1; } catch(e){}
    applyZoom(parseFloat(savedZoom));
    
    let savedTheme = 'light';
    try { savedTheme = localStorage.getItem(UI_THEME_KEY) || 'light'; } catch(e){}
    applyTheme(savedTheme);

    syncWindowSize();
  }

  initControls();

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'success') setStatus(msg.text, 'ok');
    else if (msg.type === 'error') setStatus(msg.text, 'error');
    else if (msg.type === 'warn')  setStatus(msg.text, 'warn');
  };
</script>
</body>
</html>
