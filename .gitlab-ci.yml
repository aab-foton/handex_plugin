# =============================================================================
# CAIXA Design — Monorepo CI
#
# Este é o único arquivo CI no root do monorepo. Cada plugin pode anexar
# seus próprios jobs aqui (ou via `include:`). Hoje só temos o job do handex.
#
# Job principal: refresh-dsc-skeleton
#   - roda agendado (scheduled) ou manual (web)
#   - busca refs do Figma via REST API → regenera o skeleton DSC
#   - se houver diferenças, abre branch com prefixo `bot/dsc-skeleton-`
#     e cria Merge Request automaticamente para revisão humana
#   - NUNCA faz push direto em main (rollback fácil = reverter o MR)
#
# Variáveis CI necessárias (configurar em Settings → CI/CD → Variables):
#   FIGMA_TOKEN          (Masked, Protected)  — Personal Access Token Figma com acesso de leitura nas libs DSC
#   HANDEX_BOT_TOKEN     (Masked, Protected)  — Project Access Token com escopo `api` + `write_repository`
#                                                 → usado para push da branch + criar MR
# =============================================================================

stages:
  - dsc-sync

variables:
  GIT_DEPTH: "5"
  HANDEX_DIR: "plugins/handex"

# ─── Job: refresh-dsc-skeleton ──────────────────────────────────────────────
refresh-dsc-skeleton:
  stage: dsc-sync
  image: node:20-alpine
  rules:
    # Pipelines agendadas (recomendado: semanal, segunda 6h da manhã UTC)
    - if: $CI_PIPELINE_SOURCE == "schedule"
    # Permite disparar manual pela UI do GitLab
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

  before_script:
    - apk add --no-cache git curl jq
    - git config --global user.email "handex-bot@foton.la"
    - git config --global user.name  "Handex Skeleton Bot"
    - cd "${HANDEX_DIR}"
    - npm ci --prefer-offline --no-audit --no-fund

  script:
    # 1. Snapshot do skeleton atual para detectar mudança real
    - cp src/plugin/refs/_skeleton.json /tmp/skeleton-before.json 2>/dev/null || echo "{}" > /tmp/skeleton-before.json

    # 2. Busca refs da Figma + regenera skeleton
    - echo "→ Fetching refs from Figma REST API…"
    - node src/plugin/refs/fetch-design-refs.cjs
    - echo "→ Rebuilding skeleton…"
    - node src/plugin/refs/build-skeleton.cjs

    # 3. Se idêntico, encerra silenciosamente
    - |
      if cmp -s /tmp/skeleton-before.json src/plugin/refs/_skeleton.json; then
        echo "✓ Skeleton já está atualizado. Nada a fazer."
        exit 0
      fi
      echo "→ Skeleton mudou. Preparando branch + MR…"

    # 4. Volta pro root do repo para o push
    - cd "${CI_PROJECT_DIR}"

    # 5. Cria branch nova com timestamp + PIPELINE_IID
    - BRANCH="bot/dsc-skeleton-$(date -u +%Y%m%d-%H%M)-pip${CI_PIPELINE_IID}"
    - echo "BRANCH=$BRANCH" >> build.env
    - git checkout -b "$BRANCH"
    - git add "${HANDEX_DIR}/src/plugin/refs/_skeleton.json" "${HANDEX_DIR}/src/plugin/refs/_manifest.json" "${HANDEX_DIR}/src/plugin/refs/"*.json
    - 'git commit -m "chore(handex/dsc): atualiza skeleton de referência ($(date -u +%Y-%m-%d))" -m "Gerado automaticamente por refresh-dsc-skeleton (pipeline #${CI_PIPELINE_IID})." || (echo "nada para commitar" && exit 0)'
    - git push "https://oauth2:${HANDEX_BOT_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "$BRANCH"

    # 6. Cria MR via API
    - |
      MR_TITLE="chore(handex/dsc): atualização automática do skeleton — $(date -u +%Y-%m-%d)"
      MR_BODY=$(cat <<EOF
      Atualização automática do skeleton de referência da DSC para o plugin Handex.

      **Origem:** scheduled pipeline #${CI_PIPELINE_IID}
      **Pasta tocada:** \`plugins/handex/src/plugin/refs/\`
      **Diff resumido:**
      \`\`\`
      $(diff /tmp/skeleton-before.json "${HANDEX_DIR}/src/plugin/refs/_skeleton.json" 2>/dev/null | head -40 || echo "(diff binário)")
      \`\`\`

      ✅ Revisar e merge se OK.
      ↩  Para reverter, basta fechar este MR — a branch fica preservada como histórico.

      _Pipeline:_ ${CI_PIPELINE_URL}
      EOF
      )
      curl --silent --fail \
        --header "PRIVATE-TOKEN: ${HANDEX_BOT_TOKEN}" \
        --request POST \
        --data-urlencode "source_branch=${BRANCH}" \
        --data-urlencode "target_branch=${CI_DEFAULT_BRANCH}" \
        --data-urlencode "title=${MR_TITLE}" \
        --data-urlencode "description=${MR_BODY}" \
        --data-urlencode "remove_source_branch=false" \
        --data-urlencode "labels=auto,dsc-skeleton,handex" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests" \
        | jq -r '.web_url // .message'

  artifacts:
    when: on_success
    expire_in: 30 days
    paths:
      - "plugins/handex/src/plugin/refs/_skeleton.json"
      - "plugins/handex/src/plugin/refs/*.json"
    reports:
      dotenv: build.env
